kind = "web"
previewPath = "/"
title = "JS Playground"
version = "1.0.0"
id = "artifacts/js-playground"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25851

[services.development]
run = "pnpm --filter @workspace/js-playground run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/js-playground", "run", "build" ]
publicDir = "artifacts/js-playground/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25851"
BASE_PATH = "/"
